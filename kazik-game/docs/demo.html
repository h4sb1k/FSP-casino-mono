<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS:GO Roulette Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --bg: #0b0c14;
      --panel: #151724;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --accent: #f59e0b;
      --item-width: 110px;
      --rarity-common: #b0c3d9;
      --rarity-uncommon: #5e98d9;
      --rarity-rare: #4b69ff;
      --rarity-mythical: #8847ff;
      --rarity-legendary: #d32ce6;
      --rarity-ancient: #eb4b4b;
      --rarity-contraband: #ffd700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      background: radial-gradient(circle at center, #161a2b 0%, #080910 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      text-align: center;
      width: 90vw;
      max-width: 900px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .roulette-wrapper {
      position: relative;
      height: 160px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.5);
    }

    .fade-left, .fade-right {
      position: absolute;
      top: 0; bottom: 0; width: 120px;
      z-index: 5;
      pointer-events: none;
    }
    .fade-left { left: 0; background: linear-gradient(to right, var(--panel), transparent); }
    .fade-right { right: 0; background: linear-gradient(to left, var(--panel), transparent); }

    .pointer {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 4px; height: 100%;
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent);
    }
    .pointer::after {
      content: '▼';
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      color: var(--accent);
      font-size: 1.2rem;
      text-shadow: 0 0 8px rgba(245,158,11,0.8);
    }

    .tape {
      display: flex;
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      will-change: transform;
    }

    .item {
      width: var(--item-width);
      height: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 40%);
      position: relative;
    }
    .item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: var(--rarity-color);
      box-shadow: 0 2px 10px var(--rarity-color);
    }
    .item-icon { font-size: 2.5rem; margin-bottom: 6px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
    .item-name { font-size: 0.75rem; color: #a0aec0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    .controls { margin-top: 2rem; }
    #spinBtn {
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #000;
      font-weight: 800;
      font-size: 1.1rem;
      padding: 14px 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(245,158,11,0.3);
      transition: transform 0.2s, filter 0.2s;
    }
    #spinBtn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    #spinBtn:active { transform: translateY(1px); }
    #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: grayscale(0.6); }

    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      backdrop-filter: blur(6px);
    }
    .modal-content {
      background: var(--panel);
      padding: 32px;
      border-radius: 20px;
      border: 2px solid var(--accent);
      text-align: center;
      transform: scale(0.8);
      box-shadow: 0 0 60px rgba(245,158,11,0.4);
    }
    .modal h2 { font-size: 2rem; margin-bottom: 16px; color: var(--accent); }
    .modal .winner-icon { font-size: 4rem; margin-bottom: 8px; }
    .modal .winner-name { font-size: 1.2rem; color: var(--text); font-weight: 700; }
    .modal .close-btn {
      margin-top: 20px;
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .modal .close-btn:hover { background: var(--border); }

    .particles-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 20;
    }
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
    }

    /* Адаптив */
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      :root { --item-width: 85px; }
      .roulette-wrapper { height: 130px; }
      .item-icon { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="scene">
  <h1>🎰 ROULETTE</h1>
  
  <div class="roulette-wrapper" id="roulette">
    <div class="pointer" id="pointer"></div>
    <div class="fade-left"></div>
    <div class="fade-right"></div>
    <div class="tape" id="tape"></div>
    <div class="particles-container" id="particles"></div>
  </div>

  <div class="controls">
    <button id="spinBtn">КРУТИТЬ</button>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>🏆 ВЫПАЛ ПРЕДМЕТ!</h2>
      <div class="winner-icon" id="winnerIcon">👑</div>
      <div class="winner-name" id="winnerName">Legendary Talisman</div>
      <button class="close-btn" id="closeModal">Забрать</button>
    </div>
  </div>
</div>

<script>
  // --- КОНФИГ ---
  const ITEM_WIDTH = 110;
  const VISIBLE_PADDING = 5; // предметов до/после окна
  const WINNER_INDEX = 45; // заранее определённый результат (с сервера)
  const SPIN_DURATION = 6.5; // секунд

  // База предметов
  const RARITIES = [
    { name: 'common', color: 'var(--rarity-common)' },
    { name: 'uncommon', color: 'var(--rarity-uncommon)' },
    { name: 'rare', color: 'var(--rarity-rare)' },
    { name: 'mythical', color: 'var(--rarity-mythical)' },
    { name: 'legendary', color: 'var(--rarity-legendary)' },
    { name: 'ancient', color: 'var(--rarity-ancient)' },
    { name: 'contraband', color: 'var(--rarity-contraband)' }
  ];

  const ICONS = ['🔥', '👑', '🛡️', '⚔️', '🗡️', '💎', '🦄', '🐉', '🌑', '☄️'];
  const NAMES = ['Talisman', 'Artifact', 'Curio', 'Relic', 'Charm', 'Sigil', 'Orb'];

  // --- ГЕНЕРАЦИЯ ЛЕНТЫ ---
  const tapeEl = document.getElementById('tape');
  const rouletteEl = document.getElementById('roulette');
  const pointerEl = document.getElementById('pointer');
  const spinBtn = document.getElementById('spinBtn');
  const modalEl = document.getElementById('modal');
  const closeModalBtn = document.getElementById('closeModal');
  const winnerIconEl = document.getElementById('winnerIcon');
  const winnerNameEl = document.getElementById('winnerName');
  const particlesContainer = document.getElementById('particles');

  function generateItems() {
    const fragment = document.createDocumentFragment();
    const totalItems = WINNER_INDEX + VISIBLE_PADDING * 2;

    for (let i = 0; i < totalItems; i++) {
      const div = document.createElement('div');
      div.className = 'item';
      
      // Определяем редкость (победитель всегда высокий ранг для демо)
      let rarity;
      if (i === WINNER_INDEX) {
        rarity = RARITIES[Math.floor(Math.random() * 2) + 5]; // ancient/contraband
      } else {
        rarity = RARITIES[Math.floor(Math.random() * RARITIES.length)];
      }

      div.style.setProperty('--rarity-color', rarity.color);
      div.dataset.index = i;
      
      const icon = ICONS[Math.floor(Math.random() * ICONS.length)];
      const name = NAMES[Math.floor(Math.random() * NAMES.length)] + ' #' + i;
      
      div.innerHTML = `
        <div class="item-icon">${icon}</div>
        <div class="item-name">${name}</div>
      `;
      fragment.appendChild(div);
    }
    tapeEl.appendChild(fragment);
  }

  generateItems();

  // --- РАСЧЁТ ПОЗИЦИЙ ---
  const containerWidth = rouletteEl.offsetWidth;
  const centerOffset = containerWidth / 2 - ITEM_WIDTH / 2;
  // Начальная позиция: центрируем первый видимый элемент
  gsap.set(tapeEl, { x: centerOffset - (VISIBLE_PADDING * ITEM_WIDTH) });

  // Финальная позиция: победитель по центру
  const finalX = centerOffset - (WINNER_INDEX * ITEM_WIDTH);

  // --- АНИМАЦИЯ ---
  let isSpinning = false;

  function createParticles() {
    particlesContainer.innerHTML = '';
    const count = 40;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = `${centerOffset}px`;
      p.style.top = `20px`;
      particlesContainer.appendChild(p);
      
      const angle = (Math.PI * 2 * i) / count;
      const dist = 80 + Math.random() * 120;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 20;

      gsap.to(p, {
        x: tx, y: ty, opacity: 0.8, scale: 1, duration: 0.1, ease: "power2.out",
        onComplete: () => gsap.to(p, { x: `+=${Math.random()*30-15}`, y: `+=${20+Math.random()*30}`, opacity: 0, duration: 0.6, ease: "power1.in" })
      });
    }
  }

  function runSpin() {
    if (isSpinning) return;
    isSpinning = true;
    spinBtn.disabled = true;

    // Сбрасываем позицию (для повторных прокруток)
    gsap.set(tapeEl, { x: centerOffset - (VISIBLE_PADDING * ITEM_WIDTH) });
    gsap.set(particlesContainer, { opacity: 0 });
    modalEl.style.pointerEvents = 'none';
    gsap.set(modalEl, { opacity: 0 });

    const tl = gsap.timeline({
      onComplete: () => {
        isSpinning = false;
        spinBtn.disabled = false;
        // Показываем модалку
        winnerIconEl.textContent = tapeEl.children[WINNER_INDEX].querySelector('.item-icon').textContent;
        winnerNameEl.textContent = tapeEl.children[WINNER_INDEX].querySelector('.item-name').textContent;
        gsap.to(modalEl, { opacity: 1, duration: 0.3, pointerEvents: "auto" });
        gsap.fromTo('.modal-content', { scale: 0.6, y: 30 }, { scale: 1, y: 0, duration: 0.5, ease: "back.out(1.6)" });
      }
    });

    // 1. Импульс старта
    tl.to('.roulette-wrapper', { scale: 1.02, boxShadow: "0 15px 50px rgba(245,158,11,0.6)", duration: 0.2, ease: "power2.out" });

    // 2. Основное вращение
    tl.to(tapeEl, {
      x: finalX,
      duration: SPIN_DURATION,
      ease: "power4.out", // Реалистичное замедление
      onUpdate: function() {
        // Визуальный "тик" указателя при быстром движении
        const progress = this.progress();
        const vibr = progress < 0.85 ? Math.sin(progress * 80) * 4 : 0;
        pointerEl.style.transform = `translateX(-50%) translateY(${vibr}px)`;
      }
    }, 0.1);

    // 3. Параллельные эффекты
    tl.to('.roulette-wrapper', { scale: 1, boxShadow: "0 10px 40px rgba(0,0,0,0.6)", duration: 1.5, ease: "power2.out" }, 0.5);
    
    // Тряска контейнера в момент остановки
    tl.to(rouletteEl, { 
      y: "+=6", duration: 0.05, repeat: 6, yoyo: true, ease: "steps(1)", 
      onComplete: () => gsap.set(rouletteEl, { y: 0 })
    }, `<+=${SPIN_DURATION - 0.3}`);

    // Вспышка свечения при остановке
    tl.to('.pointer', { 
      boxShadow: "0 0 40px var(--accent)", scale: 1.2, duration: 0.1, yoyo: true, repeat: 2, ease: "power2.inOut",
      onComplete: () => gsap.set(pointerEl, { boxShadow: "0 0 15px var(--accent)", scale: 1 })
    }, `<+=0.1`);

    // Частицы + победа
    tl.call(createParticles, null, `<+=0.2`);
    tl.to(particlesContainer, { opacity: 1, duration: 0.1 }, "<");
  }

  spinBtn.addEventListener('click', runSpin);

  closeModalBtn.addEventListener('click', () => {
    gsap.to(modalEl, { 
      opacity: 0, duration: 0.2, onComplete: () => {
        modalEl.style.pointerEvents = 'none';
        // Сброс ленты для демо
        gsap.set(tapeEl, { x: centerOffset - (VISIBLE_PADDING * ITEM_WIDTH) });
      } 
    });
  });

  // Ресайз
  window.addEventListener('resize', () => {
    const newWidth = rouletteEl.offsetWidth;
    const newCenter = newWidth / 2 - ITEM_WIDTH / 2;
    if (!isSpinning) {
      gsap.set(tapeEl, { x: newCenter - (VISIBLE_PADDING * ITEM_WIDTH) });
    }
  });
</script>

</body>
</html>
